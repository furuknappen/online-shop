<!DOCTYPE html>
<html lang="en-US">

<head>
  <meta charset="UTF-8">
  <meta name="author" content="Camilla Furuknappen Larsen">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Browse all our quality products to create the life you want for yourself!">
  <meta http-equiv="Content-Language" content="en">

  <!-- TODO: ned photo and url: -->
  <meta property="og:title" content="Cositas | Home">
  <meta property="og:description" content="Browse all our quality products to create the life you want for yourself!">
  <meta property="og:url" content="">
  <meta property="og:type" content="website">
  <meta property="og:image" content="">
  <meta property="og:locale" content="en_US">
  <meta property="og:site_name" content="Cositas">
 
  <!-- Favicons -->
  <link rel="shortcut icon" href="../assets/favicon/favicon.ico" type="image/x-icon">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="../assets/favicon/favicon-16x16.png">
 <link rel="apple-touch-icon" href="../assets/favicon/apple-touch-icon.png" >
 

  <link rel="stylesheet" href="../variables.css">
  <link rel="stylesheet" href="../global.css">
  <link rel="stylesheet" href="../card.css">
  <link rel="stylesheet" href="./checkout.css">
  <link rel="stylesheet" href="../cart/cart-page.css">
  <link rel="stylesheet" href="../styles/header.css">
  <link rel="stylesheet" href="../styles/footer.css">
  <title>Cositas | Home</title>
</head>

<body>
  
  <header>
    <a href="../" aria-label="Cositas Home" class="header-logo" rel="noopener noreferrer">
      Cositas
    </a>

    <div id="headerSvgs">
      <button class="profileBtn a-btn" aria-label="Profile" rel="noopener noreferrer">
        <img class="headerSvg" src="../assets/svg/profile-pic-circle.svg" alt="" aria-hidden="true">
      </button>
      <button class="cartBtn a-btn" aria-label="Shopping cart" rel="noopener noreferrer">
        <div class="cartNotification"></div>
        <img class="headerSvg" src="../assets/svg/shopping-cart.svg" alt="" aria-hidden="true">
      </button>
    </div>

    <!-- Hamburger menu -->
    <button id="hamburgerBTN" aria-label="Toggle navigation menu" aria-expanded="false" aria-controls="main-nav-mob">
      <img id="hamburgerSvg" src="../assets/svg/hamburger-menu.svg" alt="" aria-hidden="true">
    </button>

    <nav class="navLinks navMobLinks border" id="main-nav-mob" aria-label="Main Navigation" hidden>
      <a class="navLink navHome " href="../index.html" rel="noopener noreferrer">Home</a>
      <button class="navLink a-btn cartBtn " rel="noopener noreferrer">Shoppingcart</button>
      <button class="navLink a-btn profileBtn" aria-label="Open profile" rel="noopener noreferrer">Profile</button>
    </nav>
  </header>
 <main class="mainCheckoutPage">

    <section role="region" class="sectionContact" aria-label="checkout options and shipping info">
      <div>
        <h1 class="expressText">Express Checkout</h1>
        <div class="expressBtnDiv">
          <span id="new-tab-note" class="visually-hidden"> (Opens in a new tab)</span>
          <a class="expressBtn paypal" href="https://www.paypal.com/no/home" target="_blank"
            aria-label="Pay with Paypal" aria-describedby="new-tab-note" rel="noopener">
            <img src="../assets/img/paypal.png" alt="Paypal Logo">
          </a>

          <a class="expressBtn google" href="https://pay.google.com/intl/no_no/about/" aria-describedby="new-tab-note"
            target="_blank" aria-label="Pay with Google Pay" rel="noopener">
            <img src="../assets/img/googlepay.png" alt="Google Pay Logo">
          </a>
        </div>
      </div>


      <div class="dividerDiv ">
        <hr aria-hidden="true">
        <p>OR</p>
        <hr aria-hidden="true">
      </div>

      <form>
        <h1>Contact</h1>

        <label for="email"> Email Address</label>
        <input type="email" id="email" name="email" placeholder="email@example.com" required>

        <h1 class="h1SpaceOver"> Shipping Address</h1>

        <div class="checkoutNameDiv">
          <div class="form-group">
            <label for="fname"> First Name</label>
            <input type="text" id="fname" name="fname" required autocomplete="given-name"
              placeholder="Enter first name"><br>
          </div>

          <div class="form-group">
            <label for="lname"> Last Name</label>
            <input type="text" id="lname" name="lname" required placeholder="Enter Last Name"
              autocomplete="family-name"><br>
          </div>
        </div>

        <div class="form-group">
          <label for="address"> Address</label>
          <input type="text" id="address" name="address" required placeholder="Enter address"
            autocomplete="street-address"><br>
        </div>

        <div class="form-group">
          <label for="postal"> Postal Number</label>
          <input type="text" id="postal" name="postal" required placeholder="Enter postal code"
            autocomplete="postal-code"> <br>
        </div>

        <div class="form-group">
          <label for="country"> Country</label>
          <input type="text" id="country" name="country" required placeholder="Enter country"
            autocomplete="country-name"><br>
        </div>

        <div class="form-group">
          <label for="phone"> Phone Number</label>
          <input type="text" id="phone" name="phone" required placeholder="xx xx xx xx" autocomplete="tel"><br>
        </div>

        <div class="bottomButtons">
          <div class="backToBtnDivCheckout">
            <a class="linkBackBtn" href="../cart/index.html">
              <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="icon icon-tabler icons-tabler-outline icon-tabler-arrow-left">
                <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                <path d="M5 12l14 0" />
                <path d="M5 12l6 6" />
                <path d="M5 12l6 -6" />
              </svg>
              <span>
                Back to Cart
              </span>
            </a>
          </div>
          <button href="../success/confirmation.html" type="submit" class="btn checkoutBtn"> Complete Purchase</button>
        </div>
      </form>
    </section>

    <hr class="verticalDivider" aria-hidden="true">
    
    <section role="region" class="sectionOrderSummary" aria-labelledby="order-summary-heading">
      <h1 id="order-summary-heading"> Order Summary</h1>
      <div class="miniCartContainer">
        <!-- cart is displayed here -->
      </div>
      <dl>
        <div class="flexBetween">
          <dt class="orderInfo"> Discount
            <a href="comingsoon-page.html">Add a discount code</a>
          </dt>
          <dd class="orderInfo"> 0 kr
          </dd>
        </div>
        <div class="flexBetween">
          <dt class="orderInfo"> Shipping</dt>
          <dd class="orderInfo"> FREE </dd>
        </div>

        <hr aria-hidden="true">
        <div class="flexBetween totalDiv">

          <dt class="orderInfo totalP"> Total</dt>
          <dd class="orderInfo totalPrice"> </dd>
        </div>
      </dl>
    </section>
  </main>


</body>
 <script type="module" src="../scripts/header.js"></script>
 <script type="module" src="checkout.js"></script>
</html>
